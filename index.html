<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simulador NF PRO (Presión + Osmótica)</title>

<style>
body { font-family: Arial; margin: 20px; background: #f4f6f8; }
.card { background: white; padding: 15px; margin-bottom: 15px; border-radius: 10px; }
input { width: 70px; margin: 4px; }
button { background: #007BFF; color: white; padding: 10px; border: none; border-radius: 8px; }
table { border-collapse: collapse; width: 100%; margin-top: 10px; }
td, th { border: 1px solid #ccc; padding: 6px; text-align: center; }
th { background: #2c3e50; color: white; }
</style>
</head>

<body>

<h2>Simulador NF - Presión y Osmótica</h2>

<div class="card">
<h3>Condiciones</h3>
Q feed (m3/h) <input id="Qf" value="40">
Densidad (t/m3) <input id="rho" value="1.2"><br>
Presión operación (bar) <input id="P" value="18">
Permeabilidad A (LMH/bar) <input id="A" value="6">
Área total (m2) <input id="Area" value="414">
Temp (°C) <input id="T" value="25">
</div>

<div class="card">
<h3>TDS Feed (g/L)</h3>
<input id="TDS" value="120">
</div>

<button onclick="simular()">Simular</button>

<div class="card">
<h3>Resultados</h3>
<div id="out"></div>
</div>

<script>

function simular(){

let Qf = parseFloat(Qf.value);
let rho = parseFloat(rho.value);
let P = parseFloat(P.value);
let A = parseFloat(A.value);
let Area = parseFloat(Area.value);
let TDS = parseFloat(TDS.value);

// Presión osmótica (bar)
let pi_feed = 0.8 * TDS;

// asumimos concentración en rechazo ↑ 20%
let pi_rechazo = pi_feed * 1.2;

// promedio
let delta_pi = (pi_feed + pi_rechazo)/2;

// Flujo LMH
let J = A * (P - delta_pi);

// convertir a m3/h
let Qp = J * Area / 1000;

if(Qp < 0){ Qp = 0; }

// recuperación
let Rec = Qp / Qf * 100;

// OUTPUT
let html = `
<table>
<tr><th>Variable</th><th>Valor</th></tr>
<tr><td>π feed (bar)</td><td>${pi_feed.toFixed(1)}</td></tr>
<tr><td>π rechazo (bar)</td><td>${pi_rechazo.toFixed(1)}</td></tr>
<tr><td>Δπ (bar)</td><td>${delta_pi.toFixed(1)}</td></tr>
<tr><td>Flujo J (LMH)</td><td>${J.toFixed(1)}</td></tr>
<tr><td>Permeado (m3/h)</td><td>${Qp.toFixed(1)}</td></tr>
<tr><td>Recuperación (%)</td><td>${Rec.toFixed(1)}</td></tr>
</table>
`;

if(P < delta_pi){
    html += "<br><b style='color:red'>⚠ Presión insuficiente (no hay permeado)</b>";
}

document.getElementById("out").innerHTML = html;

}

</script>

</body>
</html>

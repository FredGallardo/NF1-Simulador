<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simulador NF Completo</title>

<style>
body { font-family: Arial; margin: 20px; background: #f4f6f8; }
.card { background: white; padding: 15px; margin-bottom: 15px; border-radius: 10px; }
input { width: 70px; margin: 4px; }
button { background: #007BFF; color: white; padding: 10px; border: none; border-radius: 8px; }
table { border-collapse: collapse; width: 100%; margin-top: 10px; }
td, th { border: 1px solid #ccc; padding: 6px; text-align: center; }
th { background: #2c3e50; color: white; }
</style>
</head>

<body>

<h2>Simulador NF - Balance Completo</h2>

<div class="card">
<h3>Condiciones de Alimentación</h3>
Q (m3/h): <input id="Qf" value="40">
Densidad (t/m3): <input id="rho" value="1.2">
</div>

<div class="card">
<h3>Composición (%)</h3>
Li <input id="Li" value="0.5">
B <input id="B" value="0.2">
SO4 <input id="SO4" value="1.1"><br>
Na <input id="Na" value="7">
Cl <input id="Cl" value="20">
Mg <input id="Mg" value="2">
Ca <input id="Ca" value="0.1">
CO3 <input id="CO3" value="0.05">
</div>

<div class="card">
<h3>Rechazos (%)</h3>
Li <input id="RLi" value="20">
B <input id="RB" value="50">
SO4 <input id="RSO4" value="99"><br>
Na <input id="RNa" value="10">
Cl <input id="RCl" value="5">
Mg <input id="RMg" value="95">
Ca <input id="RCa" value="98">
CO3 <input id="RCO3" value="90">
</div>

<div class="card">
<h3>Recuperación</h3>
Etapa 1 (%) <input id="Rec1" value="60">
Etapa 2 (%) <input id="Rec2" value="50">
</div>

<button onclick="simular()">Simular</button>

<div class="card">
<h3>Resultados</h3>
<div id="out"></div>
</div>

<script>

let especies = ["Li","B","SO4","Na","Cl","Mg","Ca","CO3"];

function simular(){

let Qf = parseFloat(Qf.value);
let rho = parseFloat(rho.value);

let Rec1 = parseFloat(Rec1.value)/100;
let Rec2 = parseFloat(Rec2.value)/100;

// flujo másico
let Mf = Qf * rho;

// composiciones
let Cf = {};
let R = {};

for(let e of especies){
    Cf[e] = parseFloat(document.getElementById(e).value)/100;
    R[e] = parseFloat(document.getElementById("R"+e).value)/100;
}

// masa feed
let masa_feed = {};
for(let e of especies){
    masa_feed[e] = Mf * Cf[e];
}

// ETAPA 1
let Qp1 = Qf * Rec1;
let Qr1 = Qf - Qp1;

let Mp1 = Qp1 * rho;
let Mr1 = Qr1 * rho;

let Cp1 = {}, Cr1 = {};

for(let e of especies){
    Cp1[e] = Cf[e]*(1-R[e]);
    let masa_perm = Mp1 * Cp1[e];
    Cr1[e] = (masa_feed[e] - masa_perm)/Mr1;
}

// ETAPA 2
let Qp2 = Qr1 * Rec2;
let Qr2 = Qr1 - Qp2;

let Mp2 = Qp2 * rho;
let Mr2 = Qr2 * rho;

let Cp2 = {}, Cr2 = {};

for(let e of especies){
    Cp2[e] = Cr1[e]*(1-R[e]);
    let masa_perm2 = Mp2 * Cp2[e];
    Cr2[e] = (Mr1*Cr1[e] - masa_perm2)/Mr2;
}

// RECUPERACIONES
let rec = {};

for(let e of especies){
    let masa_perm_total =
        Mp1*Cp1[e] + Mp2*Cp2[e];

    rec[e] = masa_perm_total / masa_feed[e] *100;
}

// OUTPUT
let html = `<table>
<tr><th>Especie</th><th>Recuperación (%)</th></tr>`;

for(let e of especies){
    html += `<tr><td>${e}</td><td>${rec[e].toFixed(1)}</td></tr>`;
}

html += `</table>`;

document.getElementById("out").innerHTML = html;

}

</script>

</body>
</html>

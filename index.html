<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simulador NF Planta (Avanzado)</title>

<style>
body { font-family: Arial; margin: 20px; background: #f4f6f8; }
.card { background: white; padding: 15px; margin-bottom: 15px; border-radius: 10px; }
input { width: 80px; margin: 5px; }
button { background: #007BFF; color: white; padding: 10px; border: none; border-radius: 8px; }
table { border-collapse: collapse; width: 100%; margin-top: 10px; }
td, th { border: 1px solid #ccc; padding: 8px; text-align: center; }
th { background: #2c3e50; color: white; }
</style>
</head>

<body>

<h2>Simulador Nanofiltración - Planta (Li, B, SO4)</h2>

<div class="card">
<h3>Alimentación (%)</h3>
Li: <input id="Li" value="0.53">
B: <input id="B" value="0.20">
SO4: <input id="SO4" value="1.15">
</div>

<div class="card">
<h3>Rechazo Membrana (%)</h3>
Li: <input id="RLi" value="22">
B: <input id="RB" value="50">
SO4: <input id="RSO4" value="99">
</div>

<div class="card">
<h3>Operación</h3>
Flujo Feed (m3/h): <input id="Qf" value="40"><br>
Rec Etapa 1 (%): <input id="Rec1" value="60"><br>
Rec Etapa 2 (%): <input id="Rec2" value="50">
</div>

<button onclick="simular()">Simular</button>

<div class="card">
<h3>Resultados</h3>
<div id="out"></div>
</div>

<script>
function calcEtapa(Qf, Cf, R, Rec){
    let Qp = Qf * Rec;
    let Qr = Qf - Qp;

    let Cp = Cf * (1 - R);
    let Cr = (Qf*Cf - Qp*Cp)/Qr;

    return {Qp, Qr, Cp, Cr};
}

function simular(){

let Qf = parseFloat(Qf.value);
let Rec1 = parseFloat(Rec1.value)/100;
let Rec2 = parseFloat(Rec2.value)/100;

let especies = ["Li","B","SO4"];

let Cf = {
    Li: parseFloat(Li.value),
    B: parseFloat(B.value),
    SO4: parseFloat(SO4.value)
};

let R = {
    Li: parseFloat(RLi.value)/100,
    B: parseFloat(RB.value)/100,
    SO4: parseFloat(RSO4.value)/100
};

let etapa1 = {};
let etapa2 = {};
let resultado = {};

// ETAPA 1
for(let e of especies){
    etapa1[e] = calcEtapa(Qf, Cf[e], R[e], Rec1);
}

// ETAPA 2
for(let e of especies){
    etapa2[e] = calcEtapa(etapa1[e].Qr, etapa1[e].Cr, R[e], Rec2);
}

// RECUPERACIONES
let rec = {};

for(let e of especies){

    let masa_feed = Qf * Cf[e];
    let masa_perm = 
        etapa1[e].Qp * etapa1[e].Cp +
        etapa2[e].Qp * etapa2[e].Cp;

    rec[e] = masa_perm / masa_feed * 100;
}

// TABLA
let html = `<table>
<tr><th>Corriente</th><th>Q (m3/h)</th><th>Li</th><th>B</th><th>SO4</th></tr>

<tr>
<td>P1</td>
<td>${etapa1["Li"].Qp.toFixed(2)}</td>
<td>${etapa1["Li"].Cp.toFixed(3)}</td>
<td>${etapa1["B"].Cp.toFixed(3)}</td>
<td>${etapa1["SO4"].Cp.toFixed(3)}</td>
</tr>

<tr>
<td>P2</td>
<td>${etapa2["Li"].Qp.toFixed(2)}</td>
<td>${etapa2["Li"].Cp.toFixed(3)}</td>
<td>${etapa2["B"].Cp.toFixed(3)}</td>
<td>${etapa2["SO4"].Cp.toFixed(3)}</td>
</tr>

<tr>
<td>R2</td>
<td>${etapa2["Li"].Qr.toFixed(2)}</td>
<td>${etapa2["Li"].Cr.toFixed(3)}</td>
<td>${etapa2["B"].Cr.toFixed(3)}</td>
<td>${etapa2["SO4"].Cr.toFixed(3)}</td>
</tr>

</table>

<br>
<b>Recuperación Li:</b> ${rec["Li"].toFixed(1)} %<br>
<b>Recuperación B:</b> ${rec["B"].toFixed(1)} %<br>
<b>Recuperación SO4:</b> ${rec["SO4"].toFixed(1)} %
`;

document.getElementById("out").innerHTML = html;
}
</script>

</body>
</html>

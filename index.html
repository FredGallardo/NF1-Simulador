<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Balance NF - Planta</title>

<style>
body { font-family: Arial; margin: 20px; background: #f4f6f8; }
.card { background: white; padding: 15px; margin-bottom: 15px; border-radius: 10px; }
input { width: 80px; }
table { border-collapse: collapse; width: 100%; margin-top: 10px; }
td, th { border: 1px solid #ccc; padding: 6px; text-align: center; }
th { background: #2c3e50; color: white; }
button { padding: 10px; background: #007BFF; color: white; border: none; border-radius: 8px; }
</style>
</head>

<body>

<h2>Simulador Balance NF</h2>

<!-- 🔵 ALIMENTACIÓN -->
<div class="card">
<h3>Alimentación NF</h3>

Caudal (m3/h) <input id="Qf" value="40" oninput="calcMasa()">
Densidad (t/m3) <input id="rho" value="1.2" oninput="calcMasa()">
Flujo Másico (t/h) <input id="Mf" readonly>

<br><br>

<table>
<tr><th>Componente</th><th>% p/p</th></tr>
<tr><td>Li</td><td><input id="Li" value="0.5"></td></tr>
<tr><td>Mg</td><td><input id="Mg" value="2.0"></td></tr>
<tr><td>B</td><td><input id="B" value="0.2"></td></tr>
<tr><td>SO4</td><td><input id="SO4" value="1.1"></td></tr>
<tr><td>Ca</td><td><input id="Ca" value="0.1"></td></tr>
<tr><td>Cl</td><td><input id="Cl" value="20"></td></tr>
<tr><td>Na</td><td><input id="Na" value="7"></td></tr>
<tr><td>H2O</td><td><input id="H2O" value="69.1"></td></tr>
</table>
</div>

<!-- 🟡 RECHAZOS -->
<div class="card">
<h3>Rechazos (%)</h3>
Li <input id="RLi" value="20">
Mg <input id="RMg" value="95">
B <input id="RB" value="50">
SO4 <input id="RSO4" value="99">
Ca <input id="RCa" value="98">
Cl <input id="RCl" value="5">
Na <input id="RNa" value="10">
H2O <input id="RH2O" value="0">
</div>

<!-- 🟢 OPERACIÓN -->
<div class="card">
<h3>Operación</h3>
Recuperación (%) <input id="Rec" value="70">
</div>

<button onclick="simular()">Simular</button>

<!-- 🔴 RESULTADOS -->
<div class="card">
<h3>Resultados</h3>
<div id="out"></div>
</div>

<script>

let comp = ["Li","Mg","B","SO4","Ca","Cl","Na","H2O"];

// flujo másico automático
function calcMasa(){
    let Q = parseFloat(Qf.value) || 0;
    let rho = parseFloat(rho.value) || 0;
    Mf.value = (Q*rho).toFixed(2);
}

window.onload = calcMasa;

function simular(){

let Qf = parseFloat(Qf.value);
let rho = parseFloat(rho.value);
let Mf = Qf * rho;

let Rec = parseFloat(Rec.value)/100;

// flujos
let Qp = Qf * Rec;
let Qr = Qf - Qp;

let Mp = Qp * rho;
let Mr = Qr * rho;

// composiciones
let Cf = {}, Cp = {}, Cr = {}, R = {};

for(let c of comp){
    Cf[c] = parseFloat(document.getElementById(c).value)/100;
    R[c] = parseFloat(document.getElementById("R"+c).value)/100;

    Cp[c] = Cf[c]*(1-R[c]);

    let masa_feed = Mf*Cf[c];
    let masa_perm = Mp*Cp[c];

    Cr[c] = (masa_feed - masa_perm)/Mr;
}

// tabla resultados
let html = "<table>";
html += "<tr><th>Componente</th><th>Feed (t/h)</th><th>Permeado (t/h)</th><th>Concentrado (t/h)</th></tr>";

for(let c of comp){

    let mF = Mf*Cf[c];
    let mP = Mp*Cp[c];
    let mR = Mr*Cr[c];

    html += `<tr>
    <td>${c}</td>
    <td>${mF.toFixed(2)}</td>
    <td>${mP.toFixed(2)}</td>
    <td>${mR.toFixed(2)}</td>
    </tr>`;
}

html += "</table>";

// info adicional
html += `<br>
<b>Caudal Permeado:</b> ${Qp.toFixed(2)} m3/h<br>
<b>Caudal Concentrado:</b> ${Qr.toFixed(2)} m3/h<br>
<b>Flujo másico Permeado:</b> ${Mp.toFixed(2)} t/h<br>
<b>Flujo másico Concentrado:</b> ${Mr.toFixed(2)} t/h
`;

document.getElementById("out").innerHTML = html;

}

</script>

</body>
</html>
